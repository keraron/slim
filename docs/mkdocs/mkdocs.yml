# Minimal MkDocs config for Slim (install.sh copies this to docs/mkdocs/mkdocs.yml when missing).
# For full parity with agntcy/docs (redirects, macros, API docs, Swagger), use mkdocs.template.yml instead.

site_name: Slim
site_url: https://agntcy.github.io/slim/

# Parent of docs/mkdocs/ — the Markdown tree under docs/
docs_dir: ..

exclude_docs: |
  mkdocs/**
  README.md

repo_name: agntcy/slim
repo_url: https://github.com/agntcy/slim
edit_uri: edit/main/docs/

# Navigation is loaded from docs/.index by hooks.py (on_config).

extra:
  version:
    provider: mike
  var:
    docs_url: https://agntcy.github.io/slim/
    repo_url: https://github.com/agntcy/slim
    repo_slug: agntcy/slim
    org: AGNTCY

  copyright: Copyright &copy; AGNTCY Contributors

extra_css:
  - stylesheets/agntcy-docs.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks.py

plugins:
  search:
  mike:
    alias_type: redirect
  redirects:
    redirect_maps: {}

theme:
  name: material
  custom_dir: overrides

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.ico
  logo_light: assets/agntcy/img/logo-light.svg
  logo_dark: assets/agntcy/img/logo-dark.svg
