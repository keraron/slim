# AGNTCY MkDocs starter — copy to docs/mkdocs/mkdocs.yml and replace placeholders.
# Run ./docs/install.sh (and --with-mike-macros if using mike + macros).
#
# Parity with agntcy/docs: hooks, redirects, macros, mkdocstrings,
# swagger-ui-tag, include-markdown, mike, analytics + consent (replace GA property).

site_name: MY_PROJECT_DOCS
site_url: https://example.org/

docs_dir: ..
# Must sit outside docs_dir; matches docs Taskfile `mkdocs build --site-dir`.
site_dir: ../../.build/site

exclude_docs: |
  mkdocs/**
  README.md

repo_name: org/repo
repo_url: https://github.com/org/repo
edit_uri: edit/main/docs/

extra:
  version:
    provider: mike
  var:
    docs_url: https://example.org/
    repo_url: https://github.com/org/repo
    repo_slug: org/repo
    org: AGNTCY

  copyright: >
    © Copyright AGNTCY Contributors.
    <a href="#__consent">Change cookie settings</a>
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject

extra_css:
  - stylesheets/agntcy-docs.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks.py

plugins:
  search:
  mike:
    alias_type: redirect
  redirects:
    redirect_maps:
      'how-to-guides/identity-quickstart/index.md': 'identity/identity-quickstart.md'
      'how-to-guides/agent-directory/index.md': 'dir/getting-started.md'
      'messaging/slim-core.md': 'slim/overview.md'
      'messaging/slim-a2a.md': 'slim/slim-a2a.md'
      'messaging/slim-authentication.md': 'slim/slim-authentication.md'
      'messaging/slim-controller.md': 'slim/slim-controller.md'
      'messaging/slim-data-plane-config.md': 'slim/slim-data-plane-config.md'
      'messaging/slim-data-plane.md': 'slim/slim-data-plane.md'
      'messaging/slim-group-tutorial.md': 'slim/slim-group-tutorial.md'
      'messaging/slim-group.md': 'slim/slim-group.md'
      'messaging/slim-howto.md': 'slim/slim-howto.md'
      'messaging/slim-mcp.md': 'slim/slim-mcp.md'
      'messaging/slim-rpc.md': 'slim/slim-rpc.md'
      'messaging/slim-session.md': 'slim/slim-session.md'
      'messaging/slim-slimrpc-compiler.md': 'slim/slim-slimrpc-compiler.md'
  macros:
    module_name: main
    j2_variable_start_string: "[[["
    j2_variable_end_string: "]]]"
  mkdocstrings:
    handlers:
      python:
        options:
          docstring_style: sphinx
          docstring_section_style: list
          extensions:
            - griffe_pydantic:
                schema: true
  swagger-ui-tag:
  include-markdown:

theme:
  name: material
  custom_dir: overrides

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.ico
  logo_light: assets/agntcy/img/logo-light.svg
  logo_dark: assets/agntcy/img/logo-dark.svg
