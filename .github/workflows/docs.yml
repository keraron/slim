# Build and deploy versioned documentation to gh-pages using mike.
# See https://github.com/jimporter/mike

name: Docs

on:
  push:
    branches: [main]
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch gh-pages
        run: git fetch origin gh-pages --depth=1 || true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: mkdocs
        run: uv sync

      - name: Set version from ref
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "update_aliases=true" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "update_aliases=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        working-directory: mkdocs
        run: |
          export PATH="$(pwd)/bin:$(pwd)/.venv/bin:$PATH"
          if [ "${{ steps.version.outputs.update_aliases }}" = "true" ]; then
            MIKE_DOCS_VERSION="${{ steps.version.outputs.version }}" .venv/bin/mike deploy "${{ steps.version.outputs.version }}" latest --update-aliases -b gh-pages -r origin -p
          else
            MIKE_DOCS_VERSION="${{ steps.version.outputs.version }}" .venv/bin/mike deploy "${{ steps.version.outputs.version }}" latest -b gh-pages -r origin -p
          fi

      - name: Set default version
        working-directory: mkdocs
        run: .venv/bin/mike set-default latest -b gh-pages -r origin -p
