#
# Scheduled / manual full-site link check on built HTML. Copy to .github/workflows/ at repo root.

name: Links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 06 * * *"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.1'

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: '3.48.0'

      - name: Setup UV
        shell: bash
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Update GITHUB_PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install docs site assets (install.sh)
        shell: bash
        run: |
          chmod +x docs/install.sh
          ./docs/install.sh
          ./docs/install.sh --with-mike-macros

      - name: Sync Python environment (mkdocs)
        shell: bash
        run: |
          if [ -f docs/mkdocs/pyproject.toml ] || [ -f docs/mkdocs/uv.lock ]; then
            (cd docs/mkdocs && uv sync)
          else
            python3 -m pip install -r docs/requirements-agntcy-docs-theme.txt
          fi

      - name: Build docs
        shell: bash
        run: task -t docs/Taskfile.yml build

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          args: '--config docs/lychee.toml --exclude-path "(^|/)404\\.html$" .build/site'
          fail: true
