#
# Build-only documentation check. Copy to .github/workflows/ at repo root.
# Versioned publish (mike), tagging, and releases: docs-release.yml in this folder.

name: Documentation

on:
  workflow_call:
    inputs:
      version:
        description: 'MkDocs macros VERSION (docs_build_version)'
        required: true
        type: string
        default: dev

  workflow_dispatch:
    inputs:
      version:
        description: 'MkDocs macros VERSION'
        required: false
        type: string
        default: dev

permissions:
  contents: read

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Taskfile
        shell: bash
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Setup UV
        shell: bash
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Update GITHUB_PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install docs site assets (install.sh)
        shell: bash
        run: |
          chmod +x docs/install.sh
          ./docs/install.sh
          ./docs/install.sh --with-mike-macros

      - name: Sync Python environment (mkdocs)
        shell: bash
        run: |
          if [ -f docs/mkdocs/pyproject.toml ] || [ -f docs/mkdocs/uv.lock ]; then
            (cd docs/mkdocs && uv sync)
          else
            python3 -m pip install -r docs/requirements-agntcy-docs-theme.txt
          fi

      - name: Build docs
        shell: bash
        run: |
          V="${{ inputs.version }}"
          export VERSION="${V:-dev}"
          task -t docs/Taskfile.yml build
