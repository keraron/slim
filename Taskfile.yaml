version: "3"

includes:
  control-plane:
    taskfile: control-plane/Taskfile.yaml
    flatten: true
    dir: ./control-plane
  data-plane:
    taskfile: data-plane/Taskfile.yaml
    flatten: true
    dir: ./data-plane

silent: true

vars:
  BUILD_DIR: build
  DOCS_PORT: "8001"

tasks:
  docs-deps:
    desc: Sync MkDocs dependencies
    dir: mkdocs
    cmds:
      - uv sync

  default:
    cmds:
      - task -l

  version:
    desc: Get version
    cmds:
      - git describe --tags --match "v*" | cut -c 2-

  build:
    desc: Build documentation website
    deps:
      - docs-deps
    vars:
      BUILD_SITE_DIR: "{{.BUILD_DIR}}/site"
    cmds:
      - pushd mkdocs && uv run mkdocs build --site-dir {{.BUILD_SITE_DIR}} && popd
      - |
        echo "Docs available at: file://{{.BUILD_SITE_DIR}}/index.html"

  run:
    desc: Run documentation website in live editing mode (with mike version selector)
    deps:
      - docs-deps
    cmds:
      - pushd mkdocs && MIKE_DOCS_VERSION=dev uv run python -m mkdocs serve --dev-addr 127.0.0.1:{{.DOCS_PORT}} && popd

  docs:deploy:
    desc: Deploy versioned docs to gh-pages with mike (task docs:deploy -v VERSION=1.0.0)
    deps:
      - docs-deps
    vars:
      VERSION: "dev"
    cmds:
      - |
        cd mkdocs && \
        export PATH="$(pwd)/bin:$(pwd)/.venv/bin:$PATH" && \
        MIKE_DOCS_VERSION={{.VERSION}} .venv/bin/mike deploy {{.VERSION}} latest -b gh-pages -r origin -p --update-aliases

  docs:serve-versioned:
    desc: Serve versioned docs from gh-pages branch (as on production)
    deps:
      - docs-deps
    cmds:
      - pushd mkdocs && uv run mike serve -a 127.0.0.1:{{.DOCS_PORT}} && popd