version: "3"

includes:
  control-plane:
    taskfile: control-plane/Taskfile.yaml
    flatten: true
    dir: ./control-plane
  data-plane:
    taskfile: data-plane/Taskfile.yaml
    flatten: true
    dir: ./data-plane
  docs:
    taskfile: docs/Taskfile.yml
    flatten: false

silent: true

tasks:
  default:
    cmds:
      - task -l

  version:
    desc: Get version
    cmds:
      - git describe --tags --match "v*" | cut -c 2-
